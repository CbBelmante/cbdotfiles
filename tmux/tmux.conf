# =============================================================================
# cbdotfiles — tmux config
# =============================================================================

# ---------------------------------------------------------------------------
# Core
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# OSC 66 passthrough (cb-headscale.nvim)
set -g allow-passthrough on

# ---------------------------------------------------------------------------
# Prefix: Ctrl+b (mesmo do modo tmux do Zellij)
# ---------------------------------------------------------------------------
# Já é o padrão, mas deixa explícito
set -g prefix C-b
bind C-b send-prefix

# ---------------------------------------------------------------------------
# Splits — atalhos intuitivos
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Navegação vim entre painéis
# ---------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------------------------------
# Resize painéis com HJKL (maiúsculo)
# ---------------------------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Atalhos rápidos
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config recarregado!"
bind x kill-pane
bind X kill-window
bind d detach-client
bind z resize-pane -Z

# Tabs (windows) com números
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Catppuccin config
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "session date_time"
set -g @catppuccin_date_time_text "%H:%M"

# Resurrect + Continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# ---------------------------------------------------------------------------
# Inicializar TPM (DEVE ser a última linha)
# ---------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
